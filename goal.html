                            "surface-tint": "#4cd6ff",
                            "inverse-on-surface": "#253145",
                            "primary-fixed": "#b7eaff",
                            "surface": "#071326",
                            "secondary-container": "#ce5dff",
                            "tertiary-container": "#bec0c9",
                            "tertiary-fixed": "#e1e2eb",
                            "on-secondary": "#520071",
                            "secondary-fixed-dim": "#ebb2ff",
                            "tertiary-fixed-dim": "#c4c6cf"
                        },
                        "borderRadius": {
                            "DEFAULT": "0.125rem",
                            "lg": "0.25rem",
                            "xl": "0.5rem",
                            "full": "0.75rem"
                        },
                        "spacing": {
                            "stack-sm": "4px",
                            "stack-lg": "32px",
                            "base": "8px",
                            "container-padding": "24px",
                            "stack-md": "12px",
                            "gutter": "16px",
                            "stack-gap": "16px",
                            "section-margin": "32px"
                        },
                        "fontFamily": {
                            "sans": ["Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", "sans-serif"],
                            "headline-lg-mobile": ["Pretendard"],
                            "data-mono": ["Pretendard"],
                            "body-md": ["Pretendard"],
                            "display-xl": ["Pretendard"],
                            "label-sm": ["Pretendard"],
                            "headline-lg": ["Pretendard"],
                            "label-bold": ["Pretendard"]
                        },
                        "fontSize": {
                            "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                            "data-mono": ["18px", {"lineHeight": "24px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                            "display-xl": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.01em", "fontWeight": "800"}],
                            "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                            "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                            "numeric-display": ["18px", {"lineHeight": "24px", "letterSpacing": "0.01em", "fontWeight": "700"}]
                        }
                    },
                },
            }
        } catch (_e) {}
    }catch(_e){}</script></head><body class="bg-background text-on-background min-h-screen flex flex-col font-sans">
    <!-- TopNavBar -->
    

    <!-- Main Content Area -->
    <main class="flex-grow pb-12 px-4 relative flex items-center">
        <div class="max-w-[560px] mx-auto">
            <!-- Calculator Card -->
            <div class="glass-card rounded-xl p-container-padding relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-primary-fixed-dim/50 to-transparent"></div>
                
                <div class="flex flex-col items-center gap-1 mb-8"><div class="flex items-center justify-center gap-4 mb-8"><div class="p-3 rounded-full bg-primary/10 border border-primary/20"><span class="material-symbols-outlined text-3xl text-primary-fixed-dim neon-text-glow" style="font-variation-settings: 'FILL' 1;">trending_up</span></div><h1 class="text-headline-lg font-bold text-primary-fixed-dim neon-text-glow uppercase tracking-tight">목표 수익 계산기</h1></div></div>

                <!-- Form-->
                <div class="space-y-4">
                    <!-- Purchase Price -->
                    <div class="space-y-1 group">
                        <label class="text-label-sm font-bold text-primary-fixed-dim uppercase tracking-wide block ml-1" for="purchase-price">구매단가</label>
                        <div class="relative">
                            <input class="w-full h-12 text-right font-sans font-semibold px-4 bg-surface-container-lowest border border-white/10 rounded cyber-input transition-all text-primary-fixed-dim placeholder-white/10" id="purchase-price" placeholder="0" type="number" value="113263">
                            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-outline font-sans text-xs font-bold opacity-60">KRW</div>
                        </div>
                    </div>
                    <!-- Quantity -->
                    <div class="space-y-1 group">
                        <label class="text-label-sm font-bold text-primary-fixed-dim uppercase tracking-wide block ml-1" for="quantity">수량</label>
                        <div class="relative">
                            <input class="w-full h-12 text-right font-sans font-semibold px-4 bg-surface-container-lowest border border-white/10 rounded cyber-input transition-all text-primary-fixed-dim placeholder-white/10" id="quantity" placeholder="0" type="number" value="34">
                            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-outline font-sans text-xs font-bold opacity-60">UNIT</div>
                        </div>
                    </div>
                    <!-- Target Profit -->
                    <div class="space-y-1 group">
                        <label class="text-label-sm font-bold text-primary-fixed-dim uppercase tracking-wide block ml-1" for="target-profit">목표수익</label>
                        <div class="relative">
                            <input class="w-full h-12 text-right font-sans font-semibold px-4 bg-surface-container-lowest border border-white/10 rounded cyber-input transition-all text-primary-fixed-dim placeholder-white/10" id="target-profit" placeholder="0" type="number" value="100000">
                            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-outline font-sans text-xs font-bold opacity-60">PROFIT</div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <!-- Sell Commission -->
                        <div class="space-y-1 group">
                            <label class="text-label-sm font-bold text-outline uppercase tracking-wide block ml-1" for="sell-commission">매도수수료(%)</label>
                            <input class="w-full h-12 text-right font-sans font-semibold px-4 bg-surface-container-lowest border border-white/10 rounded cyber-input transition-all text-on-surface placeholder-white/10" id="sell-commission" placeholder="0.015" step="0.001" type="number" value="0.015">
                        </div>
                        <!-- Transaction Tax -->
                        <div class="space-y-1 group">
                            <label class="text-label-sm font-bold text-outline uppercase tracking-wide block ml-1" for="transaction-tax">거래세(%)</label>
                            <input class="w-full h-12 text-right font-sans font-semibold px-4 bg-surface-container-lowest border border-white/10 rounded cyber-input transition-all text-on-surface placeholder-white/10" id="transaction-tax" placeholder="0.20" step="0.01" type="number" value="0.15">
                        </div>
                    </div>
                </div>

                <!-- Results Section -->
                <div class="mt-8 bg-surface-container-lowest/50 border border-white/5 rounded-lg p-6 space-y-4 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-primary-fixed-dim"></div>
                    <div class="flex justify-between items-center">
                        <span class="text-label-sm font-bold text-outline uppercase">수익률</span>
                        <span class="text-2xl font-bold text-primary-fixed-dim neon-text-glow" id="res-profit-rate">2.60 %</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-label-sm font-bold text-outline uppercase">목표 매도가</span>
                        <span class="font-bold text-on-surface" id="res-target-sell">116,204원</span>
                    </div>
                    <div class="flex justify-between items-center border-t border-white/5 pt-3">
                        <span class="text-label-sm font-bold text-outline uppercase">세금/수수료 포함</span>
                        <span class="font-bold text-[#00ff88] drop-shadow-[0_0_8px_rgba(0,255,136,0.4)]" id="res-total-price">116,396원</span>
                    </div>
                </div>

                <!-- Action Button -->
                <button class="w-full mt-6 py-4 ghost-button-cyber text-error font-bold text-sm uppercase tracking-widest rounded-lg flex items-center justify-center gap-2 group" id="reset-btn">
                    <span class="material-symbols-outlined text-xl group-hover:rotate-180 transition-transform duration-500">restart_alt</span>
                    <span class="">입력값 초기화</span>
                </button>
                <p class="mt-4 text-center text-label-sm font-medium text-outline/50 uppercase tracking-tight text-[10px]">SJ</p>
            </div>
        </div>
    </main>

    <script>
        const purchasePriceInput = document.getElementById('purchase-price');
        const quantityInput = document.getElementById('quantity');
        const targetProfitInput = document.getElementById('target-profit');
        const sellCommissionInput = document.getElementById('sell-commission');
        const transactionTaxInput = document.getElementById('transaction-tax');
        const resetBtn = document.getElementById('reset-btn');

        const resProfitRate = document.getElementById('res-profit-rate');
        const resTargetSell = document.getElementById('res-target-sell');
        const resTotalPrice = document.getElementById('res-total-price');

        function calculate() {
            const buyPrice = parseFloat(purchasePriceInput.value) || 0;
            const quantity = parseFloat(quantityInput.value) || 0;
            const targetProfit = parseFloat(targetProfitInput.value) || 0;
            const commissionRate = (parseFloat(sellCommissionInput.value) || 0) / 100;
            const taxRate = (parseFloat(transactionTaxInput.value) || 0) / 100;

            if (quantity <= 0 || buyPrice <= 0) return;

            const totalBuyPrice = buyPrice * quantity;
            const rawTargetSellPrice = (targetProfit + totalBuyPrice) / quantity;
            const targetSellPriceWithFees = rawTargetSellPrice / (1 - commissionRate - taxRate);
            
            const profitRate = ((targetSellPriceWithFees - buyPrice) / buyPrice) * 100;

            resProfitRate.innerText = `${profitRate.toFixed(2)} %`;
            resTargetSell.innerText = `${Math.round(rawTargetSellPrice).toLocaleString()}원`;
            resTotalPrice.innerText = `${Math.round(targetSellPriceWithFees).toLocaleString()}원`;

            localStorage.setItem('calc_data_cyber', JSON.stringify({
                buyPrice, quantity, targetProfit, commissionRate: commissionRate*100, taxRate: taxRate*100
            }));
        }

        function resetInputs() {
            purchasePriceInput.value = '';
            quantityInput.value = '';
            targetProfitInput.value = '';
            sellCommissionInput.value = '0.015';
            transactionTaxInput.value = '0.15';
            
            resProfitRate.innerText = '0.00 %';
            resTargetSell.innerText = '0원';
            resTotalPrice.innerText = '0원';
            
            localStorage.removeItem('calc_data_cyber');
        }

        [purchasePriceInput, quantityInput, targetProfitInput, sellCommissionInput, transactionTaxInput].forEach(input => {
            input.addEventListener('input', calculate);
        });

        resetBtn.addEventListener('click', resetInputs);

        window.</script></body></html>
